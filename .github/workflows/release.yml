name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../equip-${{ matrix.target }}.tar.gz equip
          cd ../../..
          shasum -a 256 equip-${{ matrix.target }}.tar.gz > equip-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: equip-${{ matrix.target }}
          path: |
            equip-${{ matrix.target }}.tar.gz
            equip-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "v${version}" \
            --generate-notes \
            artifacts/equip-*.tar.gz \
            artifacts/equip-*.sha256

  update-tap:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: trentdavies/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          version="${GITHUB_REF_NAME#v}"

          sha_darwin_arm=$(cat artifacts/equip-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          sha_darwin_x86=$(cat artifacts/equip-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          sha_linux_arm=$(cat artifacts/equip-aarch64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')
          sha_linux_x86=$(cat artifacts/equip-x86_64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')

          cat > homebrew-tap/Formula/equip.rb << FORMULA
          # typed: false
          # frozen_string_literal: true

          class Equip < Formula
            desc "Agent skill manager — add, update, and install skills across coding agents"
            homepage "https://github.com/trentdavies/equip"
            version "${version}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/trentdavies/equip/releases/download/v#{version}/equip-aarch64-apple-darwin.tar.gz"
                sha256 "${sha_darwin_arm}"
              end
              on_intel do
                url "https://github.com/trentdavies/equip/releases/download/v#{version}/equip-x86_64-apple-darwin.tar.gz"
                sha256 "${sha_darwin_x86}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/trentdavies/equip/releases/download/v#{version}/equip-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_linux_arm}"
              end
              on_intel do
                url "https://github.com/trentdavies/equip/releases/download/v#{version}/equip-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_linux_x86}"
              end
            end

            def install
              bin.install "equip"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/equip --version")
            end
          end
          FORMULA

          # Fix heredoc indentation
          sed -i 's/^          //' homebrew-tap/Formula/equip.rb

      - name: Push tap update
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          cd homebrew-tap
          git remote set-url origin "https://x-access-token:${TAP_TOKEN}@github.com/trentdavies/homebrew-tap.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/equip.rb
          git commit -m "equip ${version}"
          git push
