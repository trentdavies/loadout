[package]
name = "skittle"
version = "0.1.0"
edition = "2021"
description = "Agent skill manager — source, cache, and install skills across coding agents"

[[bin]]
name = "skittle"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
serde_json = "1"
reqwest = { version = "0.12", features = ["blocking"] }
git2 = "0.19"
dirs = "6"
colored = "3"
thiserror = "2"
anyhow = "1"
glob = "0.3"

[dev-dependencies]
tempfile = "3"
